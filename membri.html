<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membri - La Nueva Familia</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup-box {
            width: 420px;
            max-width: 95%;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }

        .popup-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        .info-row {
            margin-top: 18px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(255, 255, 255, .05);
        }

        .view-btn {
            margin-top: 15px;
            border: none;
            padding: 14px 22px;
            border-radius: 16px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
        }

        .close-btn {
            width: 100%;
            margin-top: 20px;
            border: none;
            padding: 15px;
            border-radius: 18px;
            cursor: pointer;
            color: white;
            font-weight: 600;
            background: #ef4444;
        }

        .member-card {
            padding: 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.05);
            text-align: center;
        }

        .member-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
        }

        .member-status {
            margin-top: 10px;
            font-size: 14px;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="sidebar">

        <div class="logo">
            <h1>LA NUEVA</h1>
            <span>FAMILIA</span>
            <p>MAFIA PANEL</p>
        </div>

        <nav>
            <a href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a class="active" href="membri.html"><i class="fa-solid fa-users"></i> Membri</a>
            <a href="uniforma.html"><i class="fa-solid fa-shirt"></i> Uniformă</a>
            <a href="locatii.html"><i class="fa-solid fa-location-dot"></i> Locații</a>
            <a href="infocraft.html"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
            <a href="craftarme.html"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
            <a href="livrari.html"><i class="fa-solid fa-truck"></i> Livrări</a>
            <a href="fonduri.html"><i class="fa-solid fa-money-bill-wave"></i> Fonduri</a>
            <a href="telefon.html"><i class="fa-solid fa-phone"></i> Nr Tel</a>
            <a href="taskuri.html"><i class="fa-solid fa-list-check"></i> Task-uri</a>
        </nav>

    </div>

    <div class="main">

        <div class="page-title">
            <h1>Membri Familie</h1>
            <p>Gestionare membri activi</p>
        </div>

        <div class="members-grid" id="membersGrid"></div>

    </div>

</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">

    <div class="glass popup-box">

        <img id="popupAvatar" class="popup-avatar" src="">

        <h2 id="popupName">User</h2>

        <div class="info-row">
            📱 Telefon:
            <br>
            <strong id="popupPhone">Nesetat</strong>
        </div>

        <div class="info-row">
            📋 Task-uri:
            <br>
            <strong id="popupTasks">0</strong>
        </div>

        <button class="close-btn" onclick="closePopup()">Închide</button>

    </div>

</div>

<script>

const membersGrid = document.getElementById("membersGrid");

function renderMembers() {

    const users = JSON.parse(localStorage.getItem("lnf_users") || "[]");
    const tasks = JSON.parse(localStorage.getItem("lnf_tasks") || "[]");
    const now = Date.now();

    membersGrid.innerHTML = "";

    users.forEach(user => {

        const avatar = user.avatar || "https://i.imgur.com/zYxDCQT.png";

        const isOnline =
            user.online &&
            user.lastSeen &&
            (now - user.lastSeen < 15000);

        const completedTasks =
            tasks.filter(t => t.user === user.username).length;

        membersGrid.innerHTML += `
            <div class="member-card">

                <img src="${avatar}"
                     class="member-avatar"
                     onclick="changePhoto('${user.username}')">

                <h3>${user.username}</h3>

                <div class="member-status">
                    ${isOnline ? "🟢 Online" : "🔴 Offline"}
                </div>

                <button class="view-btn"
                        onclick="viewMember('${user.username}')">
                    Vizualizează
                </button>

            </div>
        `;
    });
}

function viewMember(username) {

    const users = JSON.parse(localStorage.getItem("lnf_users") || "[]");
    const tasks = JSON.parse(localStorage.getItem("lnf_tasks") || "[]");

    const user = users.find(u => u.username === username);

    const phone = user?.phone || "Nesetat";
    const avatar = user?.avatar || "https://i.imgur.com/zYxDCQT.png";

    const completedTasks = tasks.filter(t => t.user === username).length;

    document.getElementById("popupAvatar").src = avatar;
    document.getElementById("popupName").innerText = username;
    document.getElementById("popupPhone").innerText = phone;
    document.getElementById("popupTasks").innerText = completedTasks;

    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function changePhoto(username) {
    alert("Avatar se schimbă din profil (sau îți pot face sistem admin de editare)");
}

renderMembers();

setInterval(renderMembers, 3000);

</script>

</body>
</html>
